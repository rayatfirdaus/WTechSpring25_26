<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration</title>
    
</head>
<body>
    <head>
        <h1>Student Registration Page</h1>
    </head>
    <form>
         <label for="Name">Student Name: </label>
         <input type="text" id="Name" name="StudentName" placeholder="Enter your name"><br><br>

         <label for="CGPA">Student CGPA: </label>
         <input type="text" id="CGPA" name="StudentCGPA" placeholder="Enter your CGPA"><br><br>

         <label for="GenderMale">Male</label>
         <input type="radio" id="GenderMale" name="Gender" value="Male"><br><br>

         <label for="GenderFemale">Female</label>
         <input type="radio" id="GenderFemale" name="Gender" value="Female"><br><br>

         <label for="StudentDepertment">Select Depertment: </label>
         <select name="Depertment" id="StudentDepertment">
            <option value=""> </option>
            <option value="cse">CSE</option>
            <option value="eee">EEE</option>
            <option value="bba">BBA</option>
            <option value="ipe">IPE</option>
         </select><br><br>

         <label for="StudentID">Student ID: </label>
         <input type="text" id="StudentID" name="Id"><br><br>

         <label for="StudentAddress">Address: </label>
         <textarea name="Address" id="StudentAddress" rows="4" cols="30" placeholder="Enter your address here"></textarea><br><br>

         <label for="StudentDOB">Date of Birth: </label>
         <input type="date" id="StudentDOB" name="DOB"><br><br>

         <label for="StudentEmail">Email: </label>
         <input type="text" name="Email" id="StudentEmail" placeholder="Enetr your email"><br><br>

         <label for="StudentGrade">Upload your Grade Report: </label>
         <input type="file" name="Grade" id="StudentGrade"><br><br>

         <label for="CheckBox">I agree to the terms and conditions </label>
         <input type="checkbox" name="CheckBox" id="Checkbox"><br><br>

         <label for="StudentPhone">Phone Number:</label>
         <input type="text" name="Phonenumber" id="StudentPhone" placeholder="Enter your phone number" size="25"><br><br>

         <label for="Submit">Submit your information</label><br>
         <button type="submit">Submit

         </button>

    </form>
</body>
</html>
