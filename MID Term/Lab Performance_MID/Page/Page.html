<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Page</title>
    <link rel="stylesheet" href="/Lab Performance_MID/Design/Style.css">
</head>
<body>
    <header>
        <div class="form-box">
        <h2>Product Management Page</h1>
        <label for="UnitPrice">Unit Price:</label>
    
        <input type="number" name="UnitPrice" id="Price" value="1000">
        <br>
        <br>
        <label for="QPD">Quantity per Day:</label>
        
        <input type="number" name="QPD" id="quantityPerDay" placeholder="Enter quantity per day" onchange="return collect_quantity()" value="0" min="0">
        <p id="errorQuantity"></p>
        <br>
        <br>
        <label for="TotalPrice">Total Price for 30 Days:</label>
        
        <input type="number" name="TotalPrice" id="totalPrice" value="0" readonly>
        </div>
    </header>
    <script src="/Lab Performance_MID/JS/Validation.js"></script>
</body>
</html>
