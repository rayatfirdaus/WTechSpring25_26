<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Page</title>
    <link rel="stylesheet" href="/LabPerformance/Style/Style.css">
</head>
<body>
    <header>
        <div id="container">
            <h2>Product Management Page</h2>
            <label for="UnitPrice">Unit Price:</label> 
            <input type="number" id="unitPrice" class="UnitPrice" value="1000">
            <br><br>

            <label for="QuantityPerDay">Quantity per Day:</label>
            <input type="number" id="quantityPerDay" class="QuantityPerDay" placeholder="Enter quantity per day" oninput="return total_price()" oninput="check_quantity()">
            <p id="errorValue"></p>
            <br><br>

            <label for="TotalPrice">Total Price for 30 Days:</label>
            <input type="number" id="totalPrice" class="TotalPrice" value="0"> <br>
        </div>
    </header>
    <script src="/LabPerformance/JavaScript/Validation.js"></script>
</body>
</html>
