<!DOCTYPE html>
<html>
    <head>
    <title> Registration Page </title>
        <link rel="stylesheet" href="/Lab4/Design/Style.css">
        <script src="/Lab4/Javascript/Script.js"></script>
    </head>
    <body>
    <header class="top">
    <div class="header">
        <h1> ABC Hospital Limited </h1>
    </div>

    <div class = "topnav">
        <a href="https://www.aiub.edu/"> AIUB WEBSITE </a>
    </div>
   </header>
    <h1> Patient Registration (Admission) </h1>
    
    <form onsubmit="return collect_data()">
         
        <label for="Name">Patient Name:</label> 
         <br>
         <input type="text" id="PatientName" name="Name" placeholder="Enter your name" onclick="return collect_name()">
         <p id="NameError"></p>
        
         <br> <br>
        
        <label for="Age">Age:</label> 
        <br>
        <input type="number" id="Age" name="PatientAge">
        <p id ="AgeError"></p>
        
        <br>

        <label for="DOB"> Date of Birth: </label>
        <input type="date" id="DOB" name ="PatientDOB">
        <p id="DOBError"></p>
        
        <br><br>

        <label for="GenderMale"> Male: </label>
        <input type = "radio" id="GenderMale" name="Gender" value="Male">  
        
        <br><br>

        <label for="GenderFemale"> Female: </label>
        <input type = "radio" id="GenderFemale" name="Gender" value="Female">
        
        <br><br>

        <label for="Address">Address:</label>
        <textarea id="Address" name ="PatientAddress" rows="4" cols="30" placeholder="Enter The Address" onkeyup="return collect_address()"></textarea>
        
        <br><br>

        <label for="InsertFiles">Patient Medical Report: </label>
        <input type ="file" id="InsertFiles" name="PatientFile">

        <br><br>

        <label for ="Doctor">Preferred Doctor Lists: </label>
       
        <select>
            <option values="Default"> </option>
            <option values="Cardiac"> Cardiac</option>
            <option values="Skin"> Skin </option>
            <option value="Medicine">Medicine</option>
            <option value="Orthopedic">Orthopedic</option>
        </select>

        <br><br>

        <label for="Submit">Submit Info: </label>
        <input type="submit" id="submit" name="DataSubmit">
        
    </form>
</body>
</html>
